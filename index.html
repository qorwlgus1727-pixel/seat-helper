<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자리 배치 도우미</title>
    <!-- 외부 라이브러리 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #fff5f7; min-height: 100vh; position: relative; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* 책상 스타일 */
        .desk { 
            width: 90px; height: 70px; border-radius: 8px; border: 2px solid #fce4ec; 
            transition: all 0.2s; cursor: grab; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .desk:active { cursor: grabbing; }
        .desk.over { border: 2px dashed #f06292; background-color: #fce4ec; transform: scale(1.05); }
        .seat-full { background-color: #fff0f3; border-color: #f06292; color: #d81b60; font-weight: bold; }
        
        .grid-pair { gap: 8px 4px; }
        .grid-pair .desk:nth-child(even) { margin-left: 20px; }
        .grid-exam { gap: 15px; }

        .platform { 
            width: 150px; height: 40px; background: #fce4ec; border: 2px solid #f06292; 
            color: #f06292; display: flex; align-items: center; justify-content: center; 
            margin: 10px auto; border-radius: 8px; font-weight: bold; font-size: 0.8rem;
        }

        .tab-active { background-color: #f06292 !important; color: white !important; }
        
        /* 드롭존 강조 */
        .drop-active { border: 2px dashed #f06292; background-color: #fff0f3; }

        /* 출력 메뉴 */
        #exportMenu { display: none; position: absolute; right: 0; top: 110%; z-index: 100; width: 150px; }

        @media print {
            .no-print { display: none !important; }
            .card { box-shadow: none; border: 1px solid #eee; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body class="p-4 md:p-6 pb-12">

    <div class="max-w-7xl mx-auto">
        <!-- 상단 헤더 -->
        <header class="flex flex-wrap justify-between items-center mb-6 no-print gap-4">
            <h1 class="text-2xl font-bold text-pink-600 flex items-center">🌸 자리 배치 도우미</h1>
            
            <div class="flex items-center gap-3 bg-white p-2 rounded-xl shadow-sm border border-pink-50">
                <span class="text-xs font-bold text-gray-400 ml-2">시점 전환</span>
                <button onclick="setView('student')" id="viewBtnStudent" class="px-3 py-1 rounded-lg text-sm bg-pink-100 text-pink-600 font-bold tab-active">학생 모드</button>
                <button onclick="setView('teacher')" id="viewBtnTeacher" class="px-3 py-1 rounded-lg text-sm bg-gray-100 text-gray-500 font-bold">교사 모드 (거울)</button>
            </div>

            <div class="flex gap-2 relative">
                <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" class="hidden">
                <button onclick="document.getElementById('fileInput').click()" class="bg-white text-pink-500 border border-pink-500 px-4 py-2 rounded-lg hover:bg-pink-50 font-medium transition-all">📁 명단 업로드</button>
                <button onclick="arrangeSeats()" class="bg-pink-500 text-white px-5 py-2 rounded-lg hover:bg-pink-600 shadow-md font-medium transition-all">✨ 랜덤 배치</button>
                
                <div class="relative group">
                    <button onclick="toggleExportMenu()" class="bg-gray-700 text-white px-4 py-2 rounded-lg hover:bg-gray-800 font-medium flex items-center gap-2">
                        🖨️ 출력 <small>▼</small>
                    </button>
                    <div id="exportMenu" class="card shadow-xl border border-gray-100 overflow-hidden">
                        <button onclick="exportResult('print')" class="w-full text-left px-4 py-2 hover:bg-pink-50 text-sm text-gray-700 border-b">인쇄하기</button>
                        <button onclick="exportResult('pdf')" class="w-full text-left px-4 py-2 hover:bg-pink-50 text-sm text-gray-700 border-b">PDF 저장</button>
                        <button onclick="exportResult('png')" class="w-full text-left px-4 py-2 hover:bg-pink-50 text-sm text-gray-700">PNG 이미지 저장</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- 반 탭 메뉴 -->
        <div class="flex items-center gap-2 mb-4 no-print overflow-x-auto pb-2">
            <div id="classTabs" class="flex gap-2"></div>
            <button onclick="addClass()" class="px-3 py-1 bg-white border border-dashed border-gray-400 rounded-lg text-gray-500 hover:bg-gray-50">+</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- 왼쪽: 학생 관리 -->
            <div class="lg:col-span-1 space-y-4 no-print">
                <div id="dropZone" class="card p-5 transition-all">
                    <div class="flex justify-between items-center mb-4">
                        <input type="text" id="classNameInput" onchange="renameClass(this.value)" class="text-lg font-bold text-gray-700 border-b border-transparent hover:border-gray-300 focus:outline-none focus:border-pink-500 w-2/3" value="1반">
                        <button onclick="deleteClass()" class="text-xs text-gray-400 hover:text-red-500">삭제</button>
                    </div>
                    
                    <div class="space-y-3 mb-4 bg-pink-50 p-3 rounded-lg">
                        <div class="flex items-center">
                            <input type="checkbox" id="orderMode" class="mr-2 accent-pink-500">
                            <label for="orderMode" class="text-sm text-gray-600 font-medium">명단 순서대로 배치</label>
                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" id="showNumberToggle" onchange="renderDesksByCurrent()" class="mr-2 accent-pink-500" checked>
                            <label for="showNumberToggle" class="text-sm text-gray-600 font-medium">책상 번호 표시</label>
                        </div>
                    </div>

                    <div class="text-[11px] text-gray-400 mb-2 font-bold">학생 명단 (파일을 여기로 드래그하세요)</div>
                    <ul id="studentList" class="space-y-1 text-sm text-gray-500 max-h-[400px] overflow-y-auto pr-2"></ul>
                </div>
            </div>

            <!-- 오른쪽: 배치 화면 -->
            <div class="lg:col-span-3">
                <div id="printArea" class="card p-8 min-h-[650px] flex flex-col items-center bg-white">
                    <div id="platformTop" class="platform mb-6">교탁 (칠판)</div>
                    <div id="seatGrid" class="grid justify-center p-4"></div>
                    <div id="platformBottom" class="platform mt-6 hidden">교탁 (칠판)</div>
                </div>
            </div>
        </div>

        <!-- 하단 정보 -->
        <div class="fixed bottom-2 left-4 text-[11px] text-gray-400 no-print">by. 백조니</div>

        <!-- 하단 설정 아이콘 -->
        <button onclick="openSettings()" class="no-print fixed bottom-4 right-4 bg-white p-3 rounded-full shadow-lg border border-pink-100 text-pink-400 hover:scale-110 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            </svg>
        </button>
    </div>

    <!-- 설정 모달 -->
    <div id="settingsModal" class="modal fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center z-[200]">
        <div class="bg-white p-8 rounded-2xl w-80 shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">⚙️ 배치 설정</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">책상 열 개수</label>
                    <input type="number" id="colCount" value="6" min="1" max="12" class="w-full border rounded p-2 focus:ring-2 focus:ring-pink-300 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">배치 형태</label>
                    <select id="layoutMode" class="w-full border rounded p-2 outline-none">
                        <option value="exam">시험 대형 (개별)</option>
                        <option value="pair">짝꿍 모드 (2인 1조)</option>
                    </select>
                </div>
            </div>
            <div class="mt-8 flex gap-2">
                <button onclick="saveSettings()" class="flex-1 bg-pink-500 text-white py-2 rounded-lg font-bold">적용</button>
                <button onclick="closeSettings()" class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-lg">닫기</button>
            </div>
        </div>
    </div>

    <script>
        // 상태 변수
        let classes = JSON.parse(localStorage.getItem('seatHelperData')) || [
            { id: Date.now(), name: '1반', students: [], arrangement: [] }
        ];
        let currentClassId = classes[0].id;
        let config = { view: 'student', cols: 6, mode: 'exam' };
        let dragSource = null;

        // 초기화
        window.onload = () => {
            renderTabs();
            loadClassData();
            initDragAndDrop();
        };

        // --- 출력 및 메뉴 제어 ---
        function toggleExportMenu() {
            const menu = document.getElementById('exportMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        async function exportResult(type) {
            const element = document.getElementById('printArea');
            const menu = document.getElementById('exportMenu');
            menu.style.display = 'none';

            if (type === 'print') {
                window.print();
            } else if (type === 'png') {
                const canvas = await html2canvas(element, { scale: 2 });
                const link = document.createElement('a');
                link.download = `자리배치_${getCurrentClassName()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            } else if (type === 'pdf') {
                const canvas = await html2canvas(element, { scale: 2 });
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('l', 'mm', 'a4'); // 가로 모드
                const imgProps = pdf.getImageProperties(imgData);
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(`자리배치_${getCurrentClassName()}.pdf`);
            }
        }

        // --- 드래그 앤 드롭 파일 업로드 ---
        function initDragAndDrop() {
            const dropZone = document.getElementById('dropZone');

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('drop-active');
            });

            ['dragleave', 'drop'].forEach(evt => {
                dropZone.addEventListener(evt, () => dropZone.classList.remove('drop-active'));
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                const files = e.dataTransfer.files;
                if (files.length) handleFileUpload(files[0]);
            });

            document.getElementById('fileInput').addEventListener('change', (e) => {
                if (e.target.files.length) handleFileUpload(e.target.files[0]);
            });
        }

        function handleFileUpload(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet, {header: 1});
                const names = json.map(row => row[0]).filter(n => n && n.toString().trim() !== "");
                
                const cls = getCurrentClass();
                cls.students = names;
                cls.arrangement = []; 
                saveToLocal();
                loadClassData();
            };
            reader.readAsArrayBuffer(file);
        }

        // --- 반 관리 및 유틸리티 ---
        function getCurrentClass() { return classes.find(c => c.id === currentClassId); }
        function getCurrentClassName() { return getCurrentClass().name; }

        function renderTabs() {
            const container = document.getElementById('classTabs');
            container.innerHTML = '';
            classes.forEach(cls => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-1 rounded-lg text-sm font-medium transition-all ${cls.id === currentClassId ? 'bg-pink-500 text-white shadow-md' : 'bg-white text-gray-500 hover:bg-pink-50'}`;
                btn.innerText = cls.name;
                btn.onclick = () => switchClass(cls.id);
                container.appendChild(btn);
            });
        }

        function addClass() {
            const newClass = { id: Date.now(), name: (classes.length + 1) + '반', students: [], arrangement: [] };
            classes.push(newClass);
            saveToLocal();
            renderTabs();
            switchClass(newClass.id);
        }

        function switchClass(id) {
            currentClassId = id;
            renderTabs();
            loadClassData();
        }

        function renameClass(newName) {
            const cls = getCurrentClass();
            if (cls) { cls.name = newName; saveToLocal(); renderTabs(); }
        }

        function deleteClass() {
            if (classes.length === 1) return alert('최소 한 개의 반은 있어야 합니다.');
            if (!confirm('현재 반의 모든 데이터가 삭제됩니다. 계속하시겠습니까?')) return;
            classes = classes.filter(c => c.id !== currentClassId);
            currentClassId = classes[0].id;
            saveToLocal();
            renderTabs();
            loadClassData();
        }

        function saveToLocal() { localStorage.setItem('seatHelperData', JSON.stringify(classes)); }

        function loadClassData() {
            const cls = getCurrentClass();
            document.getElementById('classNameInput').value = cls.name;
            updateStudentList(cls.students);
            renderDesks(cls.arrangement);
        }

        function updateStudentList(students) {
            const listEl = document.getElementById('studentList');
            listEl.innerHTML = students.length ? '' : '<li class="italic py-8 text-center text-gray-300">엑셀 파일을 드래그하여<br>명단을 등록하세요</li>';
            students.forEach((n, i) => {
                const li = document.createElement('li');
                li.className = 'flex justify-between p-1 border-b border-pink-50 hover:bg-pink-50';
                li.innerHTML = `<span>${i+1}. ${n}</span>`;
                listEl.appendChild(li);
            });
        }

        // --- 배치 로직 ---
        function arrangeSeats() {
            const cls = getCurrentClass();
            if (!cls.students.length) return alert('학생 명단을 먼저 업로드하세요.');

            let list = [...cls.students];
            if (!document.getElementById('orderMode').checked) {
                for (let i = list.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [list[i], list[j]] = [list[j], list[i]];
                }
            }
            cls.arrangement = list;
            saveToLocal();
            renderDesks(list);
        }

        function setView(v) {
            config.view = v;
            document.getElementById('viewBtnStudent').className = v === 'student' ? 'px-3 py-1 rounded-lg text-sm bg-pink-100 text-pink-600 font-bold tab-active' : 'px-3 py-1 rounded-lg text-sm bg-gray-100 text-gray-500 font-bold';
            document.getElementById('viewBtnTeacher').className = v === 'teacher' ? 'px-3 py-1 rounded-lg text-sm bg-pink-100 text-pink-600 font-bold tab-active' : 'px-3 py-1 rounded-lg text-sm bg-gray-100 text-gray-500 font-bold';
            renderDesksByCurrent();
        }

        function renderDesksByCurrent() {
            const cls = getCurrentClass();
            renderDesks(cls.arrangement);
        }

        function renderDesks(arrangement = []) {
            const grid = document.getElementById('seatGrid');
            const pTop = document.getElementById('platformTop');
            const pBottom = document.getElementById('platformBottom');
            const showNum = document.getElementById('showNumberToggle').checked;
            
            grid.innerHTML = '';
            grid.className = `grid ${config.mode === 'pair' ? 'grid-pair' : 'grid-exam'}`;
            grid.style.gridTemplateColumns = `repeat(${config.cols}, minmax(0, 1fr))`;

            config.view === 'teacher' ? (pTop.classList.add('hidden'), pBottom.classList.remove('hidden')) : (pTop.classList.remove('hidden'), pBottom.classList.add('hidden'));

            const totalSeats = Math.max(arrangement.length, config.cols * 4);
            
            for (let i = 0; i < totalSeats; i++) {
                let dataIdx = (config.view === 'teacher') ? (totalSeats - 1 - i) : i;
                const desk = document.createElement('div');
                desk.className = `desk ${arrangement[dataIdx] ? 'seat-full' : ''}`;
                desk.draggable = true;
                desk.dataset.index = dataIdx;

                desk.addEventListener('dragstart', handleDragStart);
                desk.addEventListener('dragover', handleDragOver);
                desk.addEventListener('dragleave', handleDragLeave);
                desk.addEventListener('drop', handleDrop);

                let numDisplay = showNum ? `<span class="text-[10px] opacity-40 absolute top-1 left-1">${dataIdx + 1}</span>` : '';
                
                if (arrangement[dataIdx]) {
                    desk.innerHTML = `${numDisplay}<span class="text-sm font-bold">${arrangement[dataIdx]}</span>`;
                    desk.style.position = 'relative';
                } else {
                    desk.innerHTML = showNum ? `<span class="text-[10px] text-gray-200">${dataIdx + 1}</span>` : '';
                }
                grid.appendChild(desk);
            }
        }

        // --- 수동 자리 교체 (드래그 앤 드롭) ---
        function handleDragStart(e) { dragSource = this; e.dataTransfer.effectAllowed = 'move'; this.style.opacity = '0.4'; }
        function handleDragOver(e) { e.preventDefault(); this.classList.add('over'); }
        function handleDragLeave() { this.classList.remove('over'); }
        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('over');
            dragSource.style.opacity = '1';
            if (dragSource !== this) {
                const srcIdx = parseInt(dragSource.dataset.index);
                const destIdx = parseInt(this.dataset.index);
                const cls = getCurrentClass();
                const temp = cls.arrangement[srcIdx];
                cls.arrangement[srcIdx] = cls.arrangement[destIdx];
                cls.arrangement[destIdx] = temp;
                saveToLocal();
                renderDesks(cls.arrangement);
            }
        }

        function openSettings() { document.getElementById('settingsModal').classList.replace('hidden', 'flex'); }
        function closeSettings() { document.getElementById('settingsModal').classList.replace('flex', 'hidden'); }
        function saveSettings() {
            config.cols = parseInt(document.getElementById('colCount').value) || 6;
            config.mode = document.getElementById('layoutMode').value;
            renderDesksByCurrent();
            closeSettings();
        }

        // 메뉴 외부 클릭 시 닫기
        window.onclick = function(event) {
            if (!event.target.matches('.group button')) {
                document.getElementById('exportMenu').style.display = 'none';
            }
        }
    </script>
</body>
</html>
